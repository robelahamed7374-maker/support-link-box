<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support Link Box Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="login-box">

<h1>🌈 SUPPORT LINK BOX</h1>

<p class="subtitle">
Dashboard
</p>

<input
type="text"
id="linkName"
placeholder="Support Name">

<input
type="text"
id="linkUrl"
placeholder="https://example.com">

<button id="addLink">

➕ ADD LINK

</button>

<hr>

<div id="linkList">

<p style="color:white;text-align:center;">
No Support Links Yet
</p>

</div>

<br>

<button id="logoutBtn">

🚪 LOGOUT

</button>

</div>

<script type="module" src="firebase.js"></script>

<script src="script.js"></script>

</body>

</html>
